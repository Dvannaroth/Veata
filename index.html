<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="styles.css">

<div class="info-card">

        <img src="img/Veata Logos black.png" alt="Veata Logo">

    <div class="banner">
        <div class="shape-white">
            <img src="img/shape-white.png">
        </div>

            <img src="img/shape-green.png">
        </div>


        <div class="container">
            <div class="slider-wrapper">
                <img id="slide-1" src="img/S01.png">
                    <img id="slide-2" src="img/S02.png">
                
            </div>
        </div>

    </div>
         


    <section class="footer">
            <h1>Veata SkyLounge & Restaurant</h1>
            <i class="fa-solid fa-location-dot"></i>
            <h2>Mekong View Tower (I) St.<br>
            Keo Chanda, Sangkat Chroy Changva,<br>
            Phnom Penh, Cambodia</h2>
            <p>ទទួលទានអាហារ ភេសជ្ជៈឆ្ងាញ់ៗ<br>

            <div class="contact-buttons">
                <button onclick="location.href='mailto:veata@mekongviewtower.com'"><i class="fa-solid fa-envelope"></i> Email</button>
                <button onclick="location.href='tel:016432202'"><i class="fa-solid fa-phone"></i> Call</button>
                <button onclick="location.href='https://t.me/VeataRestaurantCashier'">Telegram</button>
            </div>

                <a class="link-button" href="https://drive.google.com/drive/folders/1jjkuOzoQaGGDTsTSIFhmlIXNDOyB0sWn?usp=drive_link">
